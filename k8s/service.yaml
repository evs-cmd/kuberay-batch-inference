# Service — expose FastAPI + Ray Dashboard
# Access: kubectl port-forward svc/batch-inference-api 8000:8000 8265:8265

apiVersion: v1
kind: Service
metadata:
  name: batch-inference-api
  labels:
    app: kuberay-batch-inference
spec:
  type: NodePort
  selector:
    ray-node-type: head
  ports:
    - name: api
      port: 8000
      targetPort: 8000
    - name: dashboard
      port: 8265
      targetPort: 8265